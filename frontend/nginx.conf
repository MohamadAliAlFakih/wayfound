# Single-page-app nginx config.
# - Serves the built React bundle.
# - Routes /api/* to the backend container so the frontend can call /api/...
#   (matches the Vite dev proxy used in development).
# - Falls back to index.html for any unknown path so React Router works
#   on hard refresh / direct URL.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API requests get forwarded to the backend service inside the compose network.
    # Strip the /api prefix before forwarding (same behaviour as Vite proxy).
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else: try the file, fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}